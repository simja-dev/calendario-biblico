<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Restaurado</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans p-6">

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-2xl shadow-lg p-6 border border-slate-700">
        
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-white">Calendario de Gozo y Paz</h1>
            <p class="text-slate-400 mt-1">Los días van de tarde a tarde. La tarde se marca en el sector <span class="bg-[#182B59] px-1 rounded text-blue-200 font-semibold">Azul</span>.</p>
        </div>

        <div class="flex justify-between items-center mb-6 bg-slate-900 p-4 rounded-xl">
            <button id="btn-prev" class="px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-500 transition cursor-pointer text-sm">◀ Anterior</button>
            <h2 id="mes-gregoriano-titulo" class="text-2xl font-bold text-slate-200"></h2>
            <button id="btn-next" class="px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-500 transition cursor-pointer text-sm">Siguiente ▶</button>
        </div>

        <div class="grid grid-cols-7 gap-2 text-center font-bold text-slate-400 mb-2 uppercase text-sm tracking-wider">
            <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
        </div>
        
        <div id="calendario-grid" class="grid grid-cols-7 gap-3"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
