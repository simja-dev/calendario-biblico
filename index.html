<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Híbrido Personalizado (Modo Oscuro)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans p-2 sm:p-6">

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-2xl shadow-lg p-3 sm:p-6 border border-slate-700 w-full">
        
        <div class="mb-4 sm:mb-6 text-center">
            <h1 class="text-xl sm:text-3xl font-bold text-white break-words">Calendario Manual / Personalizado</h1>
            <p class="text-xs sm:text-sm text-slate-400 mt-1 balance">
                Los días van de tarde a tarde. La tarde se marca en el sector <span class="bg-[#35124A] px-1 rounded text-amber-300 font-semibold inline-block">púrpura</span>.
            </p>
        </div>

        <div class="flex justify-between items-center mb-4 sm:mb-6 bg-slate-900 p-2 sm:p-4 rounded-xl gap-2 w-full">
            <button id="btn-prev" class="px-2.5 py-1.5 sm:px-4 sm:py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-500 transition cursor-pointer text-xs sm:text-sm whitespace-nowrap">
                ◀ Ant
            </button>
            <h2 id="mes-gregoriano-titulo" class="text-base sm:text-2xl font-bold text-slate-200 text-center truncate px-1 flex-1">
                </h2>
            <button id="btn-next" class="px-2.5 py-1.5 sm:px-4 sm:py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-500 transition cursor-pointer text-xs sm:text-sm whitespace-nowrap">
                Sig ▶
            </button>
        </div>

        <div class="w-full overflow-x-auto pb-2 scrollbar-thin">
            <div class="min-w-[750px] md:min-w-full">
                
                <div class="grid grid-cols-7 gap-2 text-center font-bold text-slate-400 mb-2 uppercase text-xs sm:text-sm tracking-wider">
                    <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                </div>
                
                <div id="calendario-grid" class="grid grid-cols-7 gap-2 sm:gap-3"></div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
